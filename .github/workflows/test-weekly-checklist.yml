name: Test Weekly Checklist

on:
  workflow_dispatch:
permissions:
  contents: read
  issues: write

jobs:
  create-test-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create 16 test checklist issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            // Calculate Friday's date
            const today = new Date();
            const friday = new Date(today);
            friday.setDate(today.getDate() + (5 - today.getDay()));
            const dueDateStr = friday.toISOString().split('T')[0];
            const dateStr = today.toISOString().split('T')[0];
            
            
            const issues = [
              // ===== AGARWALS TEAM =====
              {
                title: `[AGARWALS] Check file share backup restorable`,
                severity: "critical",
                team: "agarwals",
                assignees: ["Brammanageshwaran"]
              },
              {
                title: `[AGARWALS] Check PVC backup proper`,
                severity: "critical",
                team: "agarwals",
                assignees: ["Brammanageshwaran"]
              },
              {
                title: `[AGARWALS] Check log rotation and optimize tables`,
                severity: "high",
                team: "agarwals",
                assignees: ["Brammanageshwaran"]
              },
              {
                title: `[AGARWALS] Monitor record/data growth - anomalies`,
                severity: "high",
                team: "agarwals",
                assignees: ["Brammanageshwaran"]               
              },
              {
                title: `[AGARWALS] Check job timing and performance`,
                severity: "high",
                team: "agarwals",
                assignees: ["Brammanageshwaran"]
              },
              {
                title: `[AGARWALS] Ensure all jobs running without errors`,
                severity: "critical",
                team: "agarwals",
                assignees: ["Brammanageshwaran"]
              },
              {
                title: `[AGARWALS] Verify email sending and sync status`,
                severity: "high",
                team: "agarwals",
                assignees: ["Brammanageshwaran"]
              },
              {
                title: `[AGARWALS] Validate report generation`,
                severity: "medium",
                team: "agarwals",
                assignees: ["Brammanageshwaran"]
              },
              {
                title: `[AGARWALS] Confirm Power BI dashboards refreshed`,
                severity: "medium",
                team: "agarwals",
                assignees: ["Brammanageshwaran"]
              },
              
              // ===== AVCRI TEAM =====
              {
                title: `[AVCRI] Check PVC backup proper`,
                severity: "critical",
                team: "avcri",
                assignees: ["Brammanageshwaran"]
              },
              {
                title: `[AVCRI] Monitor record/data growth - anomalies`,
                severity: "high",
                team: "avcri",
                assignees: ["Brammanageshwaran"]
              },
              {
                title: `[AVCRI] Verify check-in data sync daily`,
                severity: "high",
                team: "avcri",
                assignees: ["Brammanageshwaran"]
              },
              {
                title: `[AVCRI] Perform and verify weekly backups`,
                severity: "critical",
                team: "avcri",
                assignees: ["Brammanageshwaran"]
              },
              // ===== WEBSITE =====
              {
                title: `[WEB] Site Health Check`,
                severity: "medium",
                team: "web",
                assignees: ["Brammanageshwaran"],
                body: `
              Checklist:
              
              - [ ] Site reachable
              - [ ] Webforms working
              - [ ] Photos & alignment correct
              - [ ] Buttons redirect correctly
              - [ ] Links working
              - [ ] Captcha working
              - [ ] Content up to date
              - [ ] Backup verified
              `
              }
            ];
            
            let createdCount = 0;
            
            for (const issue of issues) {
              const labels = [`severity:${issue.severity}`, `team:${issue.team}`, "test-checklist"];
              
              try {
                const response = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: issue.body || `**Test Checklist Issue**
            
            **Week of:** ${dateStr}
            **Due:** ${dueDateStr}
            **Team:** ${issue.team}
            **Severity:** ${issue.severity}
            
            This is a test issue created by GitHub Actions automation.`,
                  assignees: issue.assignees || [],
                  labels: labels
                });
                const issueNodeId = response.data.node_id;
                
                await github.graphql(`
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: {
                      projectId: $projectId,
                      contentId: $contentId
                    }) {
                      item {
                        id
                      }
                    }
                  }
                `, {
                  projectId: "PVT_kwHOB5TKFc4BV8qj",
                  contentId: issueNodeId
                });
                
                createdCount++;
                console.log(`✅ Created issue #${response.data.number}: ${issue.title}`);
              } catch (error) {
                console.log(`❌ Error: ${error.message}`);
              }
            }
            
            console.log(`\n🎉 Successfully created ${createdCount} test issues!`);
            console.log(`📅 Due date: ${dueDateStr}`);
