name: Test Weekly Checklist

on:
  workflow_dispatch:  # Manual trigger - click button to run

jobs:
  create-test-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create 16 test checklist issues
        uses: actions/github-script@v7
        with:
          script: |
            // Calculate Friday's date
            const today = new Date();
            const friday = new Date(today);
            friday.setDate(today.getDate() + (5 - today.getDay()));
            const dueDateStr = friday.toISOString().split('T')[0];
            const dateStr = today.toISOString().split('T')[0];
            
            // Your GitHub username
            const YOUR_USERNAME = "Brammanageshwaran";
            
            const issues = [
              // ===== AGARWALS TEAM =====
              {
                title: `[AGARWALS] Check file share backup restorable`,
                severity: "critical",
                team: "agarwals"
              },
              {
                title: `[AGARWALS] Check PVC backup proper`,
                severity: "critical",
                team: "agarwals"
              },
              {
                title: `[AGARWALS] Check log rotation and optimize tables`,
                severity: "high",
                team: "agarwals"
              },
              {
                title: `[AGARWALS] Monitor record/data growth - anomalies`,
                severity: "high",
                team: "agarwals"
              },
              {
                title: `[AGARWALS] Check job timing and performance`,
                severity: "high",
                team: "agarwals"
              },
              {
                title: `[AGARWALS] Ensure all jobs running without errors`,
                severity: "critical",
                team: "agarwals"
              },
              {
                title: `[AGARWALS] Verify email sending and sync status`,
                severity: "high",
                team: "agarwals"
              },
              {
                title: `[AGARWALS] Validate report generation`,
                severity: "medium",
                team: "agarwals"
              },
              {
                title: `[AGARWALS] Confirm Power BI dashboards refreshed`,
                severity: "medium",
                team: "agarwals"
              },
              
              // ===== AVCRI TEAM =====
              {
                title: `[AVCRI] Check file share backup restorable`,
                severity: "critical",
                team: "avcri"
              },
              {
                title: `[AVCRI] Check PVC backup proper`,
                severity: "critical",
                team: "avcri"
              },
              {
                title: `[AVCRI] Monitor record/data growth - anomalies`,
                severity: "high",
                team: "avcri"
              },
              {
                title: `[AVCRI] Verify check-in data sync daily`,
                severity: "high",
                team: "avcri"
              },
              {
                title: `[AVCRI] Perform and verify weekly backups`,
                severity: "critical",
                team: "avcri"
              },
              {
                title: `[AVCRI] Review application logs`,
                severity: "medium",
                team: "avcri"
              },
              {
                title: `[AVCRI] Monitor system resources`,
                severity: "medium",
                team: "avcri"
              }
            ];
            
            let createdCount = 0;
            
            for (const issue of issues) {
              const labels = [`severity:${issue.severity}`, `team:${issue.team}`, "test-checklist"];
              
              try {
                const response = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: `**Test Checklist Issue**\n\n**Week of:** ${dateStr}\n**Due:** ${dueDateStr}\n**Team:** ${issue.team}\n**Severity:** ${issue.severity}\n\nThis is a test issue created by GitHub Actions automation.`,
                  assignees: [YOUR_USERNAME],
                  labels: labels
                });
                
                createdCount++;
                console.log(`✅ Created issue #${response.data.number}: ${issue.title}`);
              } catch (error) {
                console.log(`❌ Error: ${error.message}`);
              }
            }
            
            console.log(`\n🎉 Successfully created ${createdCount} test issues!`);
            console.log(`👤 All assigned to: ${YOUR_USERNAME}`);
            console.log(`📅 Due date: ${dueDateStr}`);
